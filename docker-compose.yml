services:
  image-proxy:
    image: nginx:stable-alpine
    container_name: image-proxy
    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cache:/var/cache/nginx
      - ./logs:/var/log/nginx

    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    environment:
      - TZ=Asia/Shanghai
