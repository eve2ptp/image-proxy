worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # =========================
    # DNS
    # =========================
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;

    # =========================
    # 缓存
    # =========================
    proxy_cache_path /var/cache/nginx levels=1:2
        keys_zone=imgcache:300m
        max_size=20g
        inactive=30d
        use_temp_path=off;

    # =========================
    # 限速（每 IP）
    # =========================
    limit_req_zone $binary_remote_addr zone=img_limit:10m rate=5r/s;

    # =========================
    # 从 URL 提取 host
    # =========================
    map $arg_url $target_host {
        default "";
        ~^https?://([^/]+)/  $1;
    }

    # =========================
    # SSRF 防护（禁止内网）
    # =========================
    map $target_host $host_allowed {
        default 1;

        ~*^(127\.|10\.|192\.168\.|172\.(1[6-9]|2\d|3[0-1])\.) 0;
        ~*localhost 0;
    }

    # =========================
    # 只允许图片 URL
    # =========================
    map $arg_url $is_image {
        default 0;
        ~*\.((jpg|jpeg|png|webp|gif|bmp|avif))(\?.*)?$ 1;
    }

    # =========================
    # Referer 策略
    # =========================
    map $target_host $custom_referer {
        default "https://example.com/";

        ~*18comic\.vip        "https://18comic.vip/";
        ~*18comic\.org        "https://18comic.org/";

        ~*jmcomic\.me         "https://18comic.vip/";
        ~*jmcomic1\.me        "https://18comic.vip/";
        ~*jm-comic3\.art      "https://18comic.vip/";
        ~*jm-comic\.club      "https://18comic.vip/";
        ~*jm-comic2\.ark      "https://18comic.vip/";

        ~*sspai               "https://sspai.com/";

        ~*cdn                 "https://example.com/";
    }

    # =========================
    # UA 伪装
    # =========================
    map $target_host $custom_ua {
        default "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/122 Safari/537.36";
    }

    server {
        listen 8080;
        server_name _;

        # =========================
        # 路径 UUID 鉴权
        # 形式：/UUID/?url=...
        # =========================
        location ~ ^/([a-f0-9-]+)/ {

            # 提取路径 token
            set $token $1;

            # 校验 UUID（自行替换）
            if ($token != "") {
                return 403;
            }

            # 限速
            limit_req zone=img_limit burst=10 nodelay;

            # 必须有 url
            if ($arg_url = "") {
                return 400 "missing url";
            }

            # 必须是图片
            if ($is_image = 0) {
                return 403 "only image allowed";
            }

            # SSRF 防护
            if ($host_allowed = 0) {
                return 403 "forbidden host";
            }

            # =========================
            # 代理
            # =========================
            proxy_pass $arg_url;

            proxy_set_header Referer $custom_referer;
            proxy_set_header Origin  $custom_referer;
            proxy_set_header User-Agent $custom_ua;

            proxy_set_header Accept "image/avif,image/webp,image/apng,image/*,*/*;q=0.8";

            # TLS
            proxy_ssl_server_name on;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # =========================
            # 缓存
            # =========================
            proxy_cache imgcache;
            proxy_cache_key "$arg_url";

            proxy_cache_valid 200 301 302 30d;
            proxy_cache_valid 404 1m;
            proxy_cache_valid 403 10m;

            proxy_cache_use_stale error timeout updating http_403 http_500 http_502 http_503 http_504;
            proxy_cache_lock on;

            add_header X-Cache-Status $upstream_cache_status;

            # =========================
            # 性能
            # =========================
            proxy_buffering on;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;

            # =========================
            # 安全
            # =========================
            proxy_hide_header Set-Cookie;
            proxy_hide_header X-Powered-By;
        }

        # 默认拒绝
        location / {
            return 403;
        }
    }
}
